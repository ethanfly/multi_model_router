<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Connection lines from center to outer nodes -->
  <g stroke-width="3" opacity="0.6">
    <line x1="256" y1="256" x2="148" y2="148" stroke="url(#g1)" filter="url(#glow)"/>
    <line x1="256" y1="256" x2="364" y2="148" stroke="url(#g2)" filter="url(#glow)"/>
    <line x1="256" y1="256" x2="148" y2="364" stroke="url(#g3)" filter="url(#glow)"/>
    <line x1="256" y1="256" x2="364" y2="364" stroke="url(#g4)" filter="url(#glow)"/>
  </g>

  <!-- Outer cross connections -->
  <g stroke-width="1.5" opacity="0.25" stroke="#64748b">
    <line x1="148" y1="148" x2="364" y2="148"/>
    <line x1="364" y1="148" x2="364" y2="364"/>
    <line x1="364" y1="364" x2="148" y2="364"/>
    <line x1="148" y1="364" x2="148" y2="148"/>
  </g>

  <!-- Center hub - routing node -->
  <circle cx="256" cy="256" r="48" fill="url(#bg)" stroke="url(#g1)" stroke-width="4" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="36" fill="url(#bg)" stroke="url(#g2)" stroke-width="2"/>
  <!-- Router arrows icon in center -->
  <g transform="translate(256,256)" fill="none" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-12,-8 L0,-16 L12,-8"/>
    <line x1="0" y1="-16" x2="0" y2="4"/>
    <path d="M-8,8 L0,16 L8,8"/>
    <line x1="0" y1="4" x2="0" y2="16" opacity="0"/>
    <!-- Distribution lines -->
    <line x1="-6" y1="-2" x2="-16" y2="6"/>
    <line x1="6" y1="-2" x2="16" y2="6"/>
    <circle cx="-16" cy="6" r="2" fill="#3b82f6"/>
    <circle cx="16" cy="6" r="2" fill="#8b5cf6"/>
  </g>

  <!-- Top-left node (OpenAI style) -->
  <circle cx="148" cy="148" r="32" fill="url(#bg)" stroke="url(#g1)" stroke-width="3" filter="url(#shadow)"/>
  <text x="148" y="155" text-anchor="middle" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="18" font-weight="700">G</text>

  <!-- Top-right node (Anthropic style) -->
  <circle cx="364" cy="148" r="32" fill="url(#bg)" stroke="url(#g2)" stroke-width="3" filter="url(#shadow)"/>
  <text x="364" y="155" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="18" font-weight="700">C</text>

  <!-- Bottom-left node -->
  <circle cx="148" cy="364" r="32" fill="url(#bg)" stroke="url(#g3)" stroke-width="3" filter="url(#shadow)"/>
  <text x="148" y="371" text-anchor="middle" fill="#8b5cf6" font-family="system-ui,sans-serif" font-size="18" font-weight="700">M</text>

  <!-- Bottom-right node -->
  <circle cx="364" cy="364" r="32" fill="url(#bg)" stroke="url(#g4)" stroke-width="3" filter="url(#shadow)"/>
  <text x="364" y="371" text-anchor="middle" fill="#f59e0b" font-family="system-ui,sans-serif" font-size="18" font-weight="700">L</text>

  <!-- Animated pulse rings on center -->
  <circle cx="256" cy="256" r="56" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <circle cx="256" cy="256" r="68" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>

  <!-- Small decorative dots -->
  <circle cx="100" cy="256" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="412" cy="256" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="256" cy="100" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="256" cy="412" r="3" fill="#f59e0b" opacity="0.4"/>
</svg>
