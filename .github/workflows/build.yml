name: Build Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runner: windows
            artifact: windows-amd64
            ext: .exe
          - os: ubuntu-latest
            runner: linux
            artifact: linux-amd64
            ext: ''
          - os: macos-latest
            runner: darwin
            artifact: darwin-universal
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Icons are committed; only regenerate on Windows (generates both ICO and PNG)
      - name: Generate icons
        if: matrix.runner == 'windows'
        continue-on-error: true
        run: |
          npm install --no-save sharp png-to-ico
          node scripts/generate-icons.mjs

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="v0.0.0-dev.${GITHUB_SHA:0:7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build
        id: build
        shell: bash
        run: |
          wails build -clean -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}"
          BINARY="build/bin/MultiModelRouter${{ matrix.ext }}"
          RENAMED="build/bin/MultiModelRouter-${{ steps.version.outputs.version }}-${{ matrix.artifact }}${{ matrix.ext }}"
          mv "$BINARY" "$RENAMED"
          echo "artifact_path=$RENAMED" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiModelRouter-${{ steps.version.outputs.version }}-${{ matrix.artifact }}${{ matrix.ext }}
          path: ${{ steps.build.outputs.artifact_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: MultiModelRouter-${{ steps.version.outputs.version }}-*
          merge-multiple: false

      - name: List downloaded files
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MultiModelRouter-${{ steps.version.outputs.version }}-*/*
          generate_release_notes: true
          draft: false
          prerelease: false
